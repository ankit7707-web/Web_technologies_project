<!DOCTYPE html>
<html>
<head>
    <title>NotionLite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <h2>NotionLite</h2>
        <div>
            <a href="#features">Features</a>
            <a href="#pricing">Pricing</a>
            <button>Login</button>
        </div>
    </div>

    <div class="hero">
        <h1>All-in-One Workspace</h1>
        <p>Create notes and manage tasks easily.</p>
        <button>Get Started</button>
    </div>

    <div id="features" class="section">
        <h2>Features</h2>
        <div class="cards">
            <div class="card">
                <h3>Notes</h3>
                <p>Write and edit notes.</p>
            </div>
            <div class="card">
                <h3>Tasks</h3>
                <p>Manage your daily tasks.</p>
            </div>
            <div class="card">
                <h3>Share</h3>
                <p>Share with friends.</p>
            </div>
        </div>
    </div>

    <div id="pricing" class="section">
        <h2>Pricing</h2>
        <div class="cards">
            <div class="card">
                <h3>Free</h3>
                <p>$0/month</p>
                <button>Choose</button>
            </div>
            <div class="card">
                <h3>Pro</h3>
                <p>$10/month</p>
                <button>Choose</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 NotionLite - College Project</p>
    </div>

</body>
</html>
